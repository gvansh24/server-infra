# Route /games/chess/ traffic to the chess app's frontend container
location /games/chess/ {
    resolver 127.0.0.11 valid=30s;
    set $chess_frontend http://chess_frontend:80;
    
    rewrite ^/games/chess/(.*) /$1 break;
    
    proxy_pass $chess_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Route WebSocket traffic directly to the chess backend
location /games/chess/ws {
    resolver 127.0.0.11 valid=30s;
    set $chess_backend http://chess_backend:3000;
    
    # We can just pass the path as-is, the websocket server doesn't care about the path
    proxy_pass $chess_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # WebSocket games can idle between moves; keep the upstream stream open.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
