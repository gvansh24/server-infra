# Route /games/chess/ traffic to the chess app's nginx container
# The trailing slash on the proxy_pass URL is crucial! It strips /games/chess/ from the path.
location /games/chess/ {
    proxy_pass http://chess_frontend:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Route WebSocket traffic directly to the chess backend
location /games/chess/ws {
    proxy_pass http://chess_backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
