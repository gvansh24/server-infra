# Route /games/exploding-kittens/ traffic to the exploding kittens container
location /games/exploding-kittens/ {
    resolver 127.0.0.11 valid=30s;
    set $exploding_kittens http://exploding_kittens:3000;
    
    # Strip the prefix before passing to backend
    rewrite ^/games/exploding-kittens/(.*) /$1 break;
    
    proxy_pass $exploding_kittens;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Support WebSockets for Vite HMR or real-time game logic
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
}
