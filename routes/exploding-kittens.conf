# Route /games/exploding-kittens/ traffic to the exploding kittens container
location /games/exploding-kittens/ {
    # Assuming network alias is exploding_kittens and port 3000 based on its express server
    proxy_pass http://exploding_kittens:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Support WebSockets for Vite HMR or real-time game logic
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
}
