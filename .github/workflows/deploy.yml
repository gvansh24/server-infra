name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Repos live under ~/server on the openclaw host
            cd ~/server/server-infra
            git pull origin main

            # Start/Update the container (docker needs sudo on this host)
            sudo docker compose up -d

            # Reload NGINX without dropping requests
            sudo docker exec master_nginx nginx -s reload
